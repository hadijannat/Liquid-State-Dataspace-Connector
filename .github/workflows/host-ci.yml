name: Host CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  host-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy, rust-src
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e 'python/pricing-oracle[dev]'
      - name: Check Rust formatting
        run: cargo fmt --all --check
      - name: Run clippy
        run: cargo clippy --workspace --all-targets --exclude liquid-data-plane-ebpf -- -D warnings
      - name: Verify repo shape
        run: cargo xtask verify-repo
      - name: Run Rust tests
        run: cargo test --workspace
      - name: Run Python tests
        run: python -m pytest python/pricing-oracle/tests
