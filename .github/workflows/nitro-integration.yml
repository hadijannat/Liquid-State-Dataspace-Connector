name: Nitro Integration

on:
  workflow_dispatch:

jobs:
  nitro-integration:
    runs-on: [self-hosted, linux, x64, nitro]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Run tee-orchestrator tests
        run: cargo test -p tee-orchestrator
      - name: Run protected lineage HTTP demo test
        run: cargo test -p control-plane-api --test http_api_tests test_phase3_three_party_demo_flow
