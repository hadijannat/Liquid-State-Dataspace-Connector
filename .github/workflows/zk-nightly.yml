name: Proof Nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  proof-nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-risczero
        run: cargo install cargo-risczero --version 5.0.0-rc.1 --locked
      - name: Run feature-gated proof-plane tests
        run: cargo test -p proof-plane-host --features risc0
      - name: Run two-hop lineage orchestration test
        run: cargo test -p control-plane --test orchestrator_tests test_two_hop_batch_lineage_flow
